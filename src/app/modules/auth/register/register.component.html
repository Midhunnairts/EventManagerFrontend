<div class="min-h-screen flex items-center justify-center p-4">
  <div class="glass-card w-full max-w-md p-8">
    <div class="text-center mb-8">
      <h1 class="text-4xl font-bold gradient-text mb-2">Create Account</h1>
      <p style="color: var(--text-muted)">Join our event management community</p>
    </div>

    <form (ngSubmit)="onSubmit()" #registerForm="ngForm" style="display: flex; flex-direction: column; gap: 1rem;">
      <div *ngIf="error" style="background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.5); color: #ef4444; padding: 0.75rem; border-radius: 0.5rem; font-size: 0.875rem;">
        {{ error }}
      </div>

      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Full Name</label>
        <input type="text" name="name" [(ngModel)]="user.name" required 
               class="input-glass" placeholder="John Doe">
      </div>

      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Email Address</label>
        <input type="email" name="email" [(ngModel)]="user.email" required 
               class="input-glass" placeholder="name@example.com">
      </div>

      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Password</label>
          <input type="password" name="password" [(ngModel)]="user.password" required 
                 class="input-glass" placeholder="••••••••">
        </div>
        <div>
          <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">Confirm</label>
          <input type="password" name="confirmPassword" [(ngModel)]="user.confirmPassword" required 
                 class="input-glass" placeholder="••••••••">
        </div>
      </div>

      <div>
        <label style="display: block; font-size: 0.875rem; font-weight: 500; margin-bottom: 0.5rem;">I am an</label>
        <select name="role" [(ngModel)]="user.role" class="input-glass" style="appearance: none;">
          <option value="User">Attendee / User</option>
          <option value="Organizer">Event Organizer</option>
        </select>
      </div>

      <button type="submit" [disabled]="!registerForm.form.valid" class="btn-primary" style="display: flex; align-items: center; justify-content: center; gap: 0.5rem; width: 100%; margin-top: 1rem;">
        <lucide-angular [img]="UserPlusIcon" size="20"></lucide-angular>
        <span>Register</span>
      </button>

      <p style="text-align: center; font-size: 0.875rem; color: var(--text-muted);">
        Already have an account? 
        <a routerLink="/login" style="color: var(--primary); text-decoration: none; font-weight: 600;">Login</a>
      </p>
    </form>
  </div>
</div>
